server {
    listen 80;
    # 将下划线 _ 替换为您的公网 IP 或域名 (例如: server_name 8.149.136.249;)
    server_name 8.149.136.249; 

    # --- 1. 前端静态文件托管 ---
    location / {
        # 指向您 npm run build 生成的 dist 目录
        root /www/wx-studio/dist;
        index index.html;
        
        # 关键配置：React 路由重定向
        # 如果找不到文件，就返回 index.html，交给 React 处理路由
        try_files $uri $uri/ /index.html;
    }

    # --- 2. 图片本地存储映射 (新增) ---
    # 当访问 http://IP/uploads/xxx.jpg 时，直接去硬盘读取文件
    location /uploads/ {
        alias /www/wx-studio/dist/uploads/;
        autoindex off; # 禁止列出目录文件
        expires 30d;   # 设置浏览器缓存 30 天，加速二次访问
        access_log off; # 不记录图片访问日志，减少 I/O
    }

    # --- 3. 后端 API 转发 (Core) ---
    location /api/ {
        # 转发给本地 8000 端口的 FastAPI
        proxy_pass http://127.0.0.1:8000/api/;
        
        # 传递客户端真实 IP (日志分析、限流必备)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 增加超时设置 (关键)
        # AI 生成图片可能需要几十秒，防止 Nginx 提前断开连接导致 504 错误
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        
        # 允许上传大图片 (默认只有 1M)
        client_max_body_size 20M;
    }
    
    # --- 4. 认证接口转发 ---
    location /auth/ {
        proxy_pass http://127.0.0.1:8000/auth/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}